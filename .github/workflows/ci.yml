name: Test Suite

on:
  push:
    branches:
      - "main"
    paths-ignore:
      - "docs/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
  schedule:
    - cron: "0 0 * * *"

jobs:
  quality:
    name: Quality (Lint, Format, Ty)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install Hatch
        run: python -m pip install --upgrade hatch virtualenv==20.39.1
      - name: Lint
        run: hatch run lint
      - name: Format check
        run: hatch run format-check
      - name: Type check (Ty)
        run: hatch run check-types

  tests:
    name: Tests + Coverage Gate (Linux, Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install Hatch
        run: python -m pip install --upgrade hatch virtualenv==20.39.1
      - name: Run tests with coverage gate
        run: hatch run test-cov

  portability:
    name: Portability Smoke (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["macos-latest", "windows-latest"]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install Hatch
        run: python -m pip install --upgrade hatch virtualenv==20.39.1
      - name: Run portability smoke tests
        run: hatch run test:test tests/cli tests/config tests/importer tests/runtime tests/unit

  docs:
    name: Docs Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install Hatch
        run: python -m pip install --upgrade hatch virtualenv==20.39.1
      - name: Build docs
        run: hatch run docs:build
