name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    name: Quality (Lint, Format, Ty)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install Hatch
        run: python -m pip install --upgrade hatch
      - name: Lint
        run: hatch run lint
      - name: Format check
        run: hatch run format-check
      - name: Type check (Ty)
        run: hatch run check-types

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install Hatch
        run: python -m pip install --upgrade hatch
      - name: Run tests with coverage gate
        run: hatch run test-cov

  docs:
    name: Docs Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install Hatch
        run: python -m pip install --upgrade hatch
      - name: Build docs
        run: hatch run docs-build
