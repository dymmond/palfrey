name: Docs

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "docs_src/**"
      - "mkdocs.yml"
      - "pyproject.toml"
  pull_request:
    branches: ["main"]
    paths:
      - "docs/**"
      - "docs_src/**"
      - "mkdocs.yml"
      - "pyproject.toml"

jobs:
  docs-build:
    name: Build Docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Hatch
        run: python -m pip install --upgrade hatch
      - name: Build docs
        run: hatch run docs-build
