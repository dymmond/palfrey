site_name: Palfrey
site_description: A clean-room ASGI server with source-traceable Uvicorn parity
site_url: https://palfrey.dymmond.com
repo_name: dymmond/palfrey
repo_url: https://github.com/dymmond/palfrey
edit_uri: ''
theme:
  name: material
  language: en
  palette:
  - scheme: default
    primary: blue
    accent: amber
    media: '(prefers-color-scheme: light)'
    toggle:
      icon: material/lightbulb
      name: Switch to dark mode
  - scheme: slate
    media: '(prefers-color-scheme: dark)'
    primary: blue
    accent: amber
    toggle:
      icon: material/lightbulb-outline
      name: Switch to light mode
  features:
  - navigation.sections
  - navigation.expand
  - search.suggest
  - search.highlight
  - content.code.copy
plugins:
- search
- meta-descriptions:
    export_csv: false
    quiet: false
    enable_checks: false
    min_length: 50
    max_length: 160
    trim: false
nav:
- Overview: index.md
- Getting Started:
  - Installation: getting-started/installation.md
  - Quickstart: getting-started/quickstart.md
  - Migration From Uvicorn: getting-started/migration-from-uvicorn.md
- Concepts:
  - Event Loop: concepts/event-loop.md
  - HTTP: concepts/http.md
  - WebSockets: concepts/websockets.md
  - Lifespan: concepts/lifespan.md
  - Middleware: concepts/middleware.md
- Reference:
  - CLI: reference/cli.md
  - Configuration: reference/configuration.md
  - Protocols: reference/protocols.md
  - Logging: reference/logging.md
- Operations:
  - Deployment: operations/deployment.md
  - Reload: operations/reload.md
  - Workers: operations/workers.md
  - Benchmarks: operations/benchmarks.md
  - Release Process: operations/release-process.md
- Validation:
  - Parity Matrix: parity-matrix.md
  - Testing Strategy: testing/testing-strategy.md
- Contributing: contributing.md
- Release Notes: release-notes.md
- Sponsorship: sponsorship.md
markdown_extensions:
- toc:
    permalink: true
- mdx_include:
    base_path: docs/
- admonition
- extra
- pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: !!python/name:pymdownx.superfences.fence_code_format ''
- pymdownx.tabbed:
    alternate_style: true
- attr_list
- md_in_html
extra:
  alternate:
  - link: /
    name: en - English
hooks:
- ../../scripts/hooks.py
